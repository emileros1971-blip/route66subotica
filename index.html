<!-- SAME FILE, ONLY JS SUBMIT PART FIXED -->

<script>
document.getElementById("y").textContent = new Date().getFullYear();

const form = document.getElementById("orderForm");
const formStatus = document.getElementById("formStatus");
const pickupField = document.getElementById("pickup");
const addressField = document.getElementById("address");
const orderPreview = document.getElementById("orderPreview");
const qtySelects = document.querySelectorAll(".menu-qty");

function setError(message) {
  formStatus.textContent = message;
  formStatus.className = "status show err";
}

function clearError() {
  formStatus.textContent = "";
  formStatus.className = "status";
}

function getSelectedItems() {
  const items = [];

  qtySelects.forEach(select => {
    const qty = parseInt(select.value, 10) || 0;
    if (qty > 0) {
      const portion = select.dataset.portion ? ` - ${select.dataset.portion}` : "";
      items.push({
        qty,
        name: `${select.dataset.name}${portion}`,
        price: select.dataset.price
      });
    }
  });

  return items;
}

function renderPreview() {
  const items = getSelectedItems();

  if (items.length === 0) {
    orderPreview.innerHTML = '<div class="summaryEmpty">Još ništa nije izabrano.</div>';
    return;
  }

  orderPreview.innerHTML = items.map(item => `
    <div class="summaryItem">
      <div>${item.qty}x ${item.name}</div>
      <div>${item.price}</div>
    </div>
  `).join("");
}

function buildOrderMessage(data, items) {
  const lines = [
    "ROUTE 66 - PORUDŽBINA",
    "",
    "PODACI KUPCA",
    `Ime i prezime: ${data.name || "-"}`,
    `Telefon: ${data.phone || "-"}`,
    `Email: ${data.email}`,
    `Način preuzimanja: ${data.pickup || "-"}`,
    `Adresa: ${data.address || "-"}`,
    "",
    "PORUČENE STAVKE"
  ];

  items.forEach((item, index) => {
    lines.push(`${index + 1}. ${item.qty}x ${item.name} (${item.price})`);
  });

  lines.push("");
  lines.push("NAPOMENA");
  lines.push(data.note || "Bez dodatne napomene.");

  return lines.join("\n");
}

function updateAddressState() {
  const isDelivery = pickupField.value === "Dostava";
  addressField.required = isDelivery;
  if (!isDelivery) addressField.value = "";
}

function showSuccess(message) {
  formStatus.textContent = message;
  formStatus.className = "status show";
  formStatus.style.background = "rgba(36,210,122,.10)";
  formStatus.style.border = "1px solid rgba(36,210,122,.28)";
  formStatus.style.color = "#b7ffd9";
}

qtySelects.forEach(select => {
  select.addEventListener("change", renderPreview);
});

pickupField.addEventListener("change", updateAddressState);

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  clearError();
  formStatus.removeAttribute("style");

  const items = getSelectedItems();
  if (items.length === 0) {
    setError("Izaberite bar jednu stavku.");
    return;
  }

  const data = {
    name: form.name.value.trim(),
    phone: form.phone.value.trim(),
    email: form.email.value.trim(),
    pickup: form.pickup.value,
    address: form.address.value.trim(),
    note: form.note.value.trim()
  };

  const orderMessage = buildOrderMessage(data, items);

  // ✅ FIX: manual payload (NO MORE EMPTY ORDERS)
  const payload = new FormData();
  payload.append("access_key", form.querySelector('[name="access_key"]').value);
  payload.append("subject", form.querySelector('[name="subject"]').value);
  payload.append("from_name", form.querySelector('[name="from_name"]').value);
  payload.append("name", data.name);
  payload.append("phone", data.phone);
  payload.append("email", data.email);
  payload.append("pickup", data.pickup);
  payload.append("address", data.address);
  payload.append("note", data.note);
  payload.append("message", orderMessage);
  payload.append("replyto", data.email);

  try {
    const response = await fetch(form.action, {
      method: "POST",
      body: payload,
      headers: { Accept: "application/json" }
    });

    const result = await response.json();

    if (!response.ok || !result.success) {
      throw new Error(result.message || "Greška.");
    }

    showSuccess("Porudžbina poslata – kompletna.");
    form.reset();
    qtySelects.forEach(s => s.value = "0");
    updateAddressState();
    renderPreview();

  } catch (error) {
    setError(error.message || "Greška.");
  }
});

updateAddressState();
renderPreview();
</script>
